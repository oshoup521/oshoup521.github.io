<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} · {{ site.title }}{% else %}{{ site.title }} — {{ site.tagline }}{% endif %}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  {% seo %}
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
</head>
<body>
  <header class="site-header">
    <div class="wrap header-inner">
      <a class="brand" href="{{ '/' | relative_url }}">
        <span class="brand-mark">OU</span>
        <span class="brand-name">Osho Upadhyay</span>
      </a>
      <nav class="site-nav" aria-label="Primary">
        {% for item in site.nav %}
          {% assign current = page.url | replace:'index.html','' %}
          <a href="{{ item.url | relative_url }}"
             class="{% if current == item.url %}active{% endif %}">{{ item.title }}</a>
        {% endfor %}
      </nav>
      <button class="nav-toggle" aria-label="Toggle menu" onclick="document.querySelector('.site-nav').classList.toggle('open')">☰</button>
    </div>
  </header>

  <main class="wrap">
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="wrap footer-inner">
      <p>&copy; {{ 'now' | date: "%Y" }} {{ site.author }}. All rights reserved.</p>
      <div class="socials">
        <a href="{{ site.social.github }}" target="_blank" rel="noopener">GitHub</a>
        <a href="{{ site.social.linkedin }}" target="_blank" rel="noopener">LinkedIn</a>
        <a href="{{ site.social.twitter }}" target="_blank" rel="noopener">Twitter</a>
        <a href="mailto:{{ site.email }}">Email</a>
      </div>
    </div>
  </footer>
</body>
</html>
